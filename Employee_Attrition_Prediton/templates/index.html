<!DOCTYPE html>
<html>
<head>
    <title>Employee Attrition Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important; }
        .stat-card { 
            background: white; 
            border-radius: 15px; 
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-number { font-size: 3rem; font-weight: bold; color: #333; }
        .stat-label { color: #888; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .btn-primary-custom {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 600;
        }
        .btn-primary-custom:hover { transform: scale(1.05); color: white; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status-text {
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
        }
        .status-success { background: #d4edda; color: #155724; }
        .status-error { background: #f8d7da; color: #721c24; }
        .status-loading { background: #cce5ff; color: #004085; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container">
            <span class="navbar-brand fs-3">🏢 Employee Attrition Predictor</span>
            <div>
                <a href="/" class="btn btn-outline-light btn-sm active">Home</a>
                <a href="/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
                <a href="/predictions" class="btn btn-outline-light btn-sm">Predictions</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-lg-10 mx-auto">
                <div class="card shadow">
                    <div class="card-body text-center p-5">
                        <h1 class="display-4 mb-3">📊 Employee Attrition Prediction</h1>
                        <p class="lead text-muted">Predict employee attrition risk using machine learning models</p>
                        <hr>
                        
                        <!-- Stats -->
                        <div class="row mt-4">
                            <div class="col-md-3">
                                <div class="stat-card">
                                    <div class="stat-number" id="total">...</div>
                                    <div class="stat-label">Total Employees</div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="stat-card">
                                    <div class="stat-number text-danger" id="high">...</div>
                                    <div class="stat-label">High Risk</div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="stat-card">
                                    <div class="stat-number text-warning" id="medium">...</div>
                                    <div class="stat-label">Medium Risk</div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="stat-card">
                                    <div class="stat-number text-success" id="low">...</div>
                                    <div class="stat-label">Low Risk</div>
                                </div>
                            </div>
                        </div>

                        <!-- Status Message -->
                        <div id="status-message" class="status-text status-loading">
                            <div class="loading-spinner"></div>
                            <span class="ms-2">Loading data from API...</span>
                        </div>

                        <!-- Buttons -->
                        <div class="mt-4">
                            <a href="/dashboard" class="btn btn-primary-custom me-2">📈 View Dashboard</a>
                            <a href="/predictions" class="btn btn-outline-primary">📋 View Predictions</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // Load Dashboard Stats
        // ============================================================
        function loadStats() {
            console.log('🔄 Loading stats...');
            
            const statusDiv = document.getElementById('status-message');
            
            fetch('/api/dashboard/stats')
                .then(response => {
                    console.log('Response status:', response.status);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    console.log('Data received:', data);
                    
                    if (data.success) {
                        const s = data.stats;
                        
                        // Update the numbers
                        document.getElementById('total').textContent = s.total_employees || 0;
                        document.getElementById('high').textContent = s.high_risk || 0;
                        document.getElementById('medium').textContent = s.medium_risk || 0;
                        document.getElementById('low').textContent = s.low_risk || 0;
                        
                        // Update status
                        statusDiv.className = 'status-text status-success';
                        statusDiv.innerHTML = '✅ Data loaded successfully!';
                    } else {
                        throw new Error(data.error || 'Unknown error');
                    }
                })
                .catch(err => {
                    console.error('Error:', err);
                    
                    // Use fallback data
                    document.getElementById('total').textContent = '1500';
                    document.getElementById('high').textContent = '45';
                    document.getElementById('medium').textContent = '127';
                    document.getElementById('low').textContent = '1328';
                    
                    statusDiv.className = 'status-text status-error';
                    statusDiv.innerHTML = `⚠️ Using sample data: ${err.message}`;
                });
        }

        // Load stats when page loads
        loadStats();

        // Reload every 30 seconds
        setInterval(loadStats, 30000);
    </script>
</body>
</html>
