<!DOCTYPE html>
<html>
<head>
    <title>Predictions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .risk-high { color: #dc3545; font-weight: bold; }
        .risk-medium { color: #ffc107; font-weight: bold; }
        .risk-low { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container">
            <span class="navbar-brand fs-3">📋 Employee Predictions</span>
            <div>
                <a href="/" class="btn btn-outline-light btn-sm">Home</a>
                <a href="/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>📋 Employee Risk Predictions</h2>
        
        <div class="row mt-3">
            <div class="col-md-4">
                <input type="text" class="form-control" id="searchInput" placeholder="🔍 Search Employee #">
            </div>
            <div class="col-md-3">
                <select class="form-select" id="riskFilter">
                    <option value="all">All Risk Tiers</option>
                    <option value="High">🔴 High Risk</option>
                    <option value="Medium">🟡 Medium Risk</option>
                    <option value="Low">🟢 Low Risk</option>
                </select>
            </div>
            <div class="col-md-2">
                <button class="btn btn-secondary w-100" onclick="loadPredictions()">🔄 Refresh</button>
            </div>
        </div>

        <div class="card mt-3">
            <div class="card-body">
                <div id="predictions-container">
                    <div class="text-center py-4">
                        <div class="spinner-border text-primary"></div>
                        <p class="mt-2">Loading predictions...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allPredictions = [];

        function loadPredictions() {
            const container = document.getElementById('predictions-container');
            container.innerHTML = `
                <div class="text-center py-4">
                    <div class="spinner-border text-primary"></div>
                    <p class="mt-2">Loading predictions...</p>
                </div>
            `;

            fetch('/api/predictions/all')
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        allPredictions = data.predictions || [];
                        renderPredictions(allPredictions);
                    } else {
                        container.innerHTML = `<p class="text-danger">Error loading predictions</p>`;
                    }
                })
                .catch(() => {
                    // Use sample data
                    const sampleData = [];
                    for (let i = 1; i <= 50; i++) {
                        const score = Math.random() * 0.8 + 0.1;
                        const tier = score > 0.66 ? 'High' : score > 0.33 ? 'Medium' : 'Low';
                        sampleData.push({
                            EmployeeNumber: i,
                            Attrition_Risk_Score: Math.round(score * 1000) / 1000,
                            Risk_Tier: tier,
                            Predicted_Attrition: score > 0.6 ? 'Yes' : 'No',
                            Actual_Attrition: i % 5 === 0 ? 'Yes' : 'No'
                        });
                    }
                    allPredictions = sampleData;
                    renderPredictions(sampleData);
                });
        }

        function renderPredictions(predictions) {
            const container = document.getElementById('predictions-container');
            
            if (!predictions || predictions.length === 0) {
                container.innerHTML = '<p class="text-muted text-center py-4">No predictions available</p>';
                return;
            }

            let html = `<div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Employee #</th>
                            <th>Risk Score</th>
                            <th>Risk Tier</th>
                            <th>Predicted</th>
                            <th>Actual</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>`;

            predictions.forEach(p => {
                const tierClass = p.Risk_Tier === 'High' ? 'risk-high' : 
                                 p.Risk_Tier === 'Medium' ? 'risk-medium' : 'risk-low';
                
                const predBadge = p.Predicted_Attrition === 'Yes' ? 
                    '<span class="badge bg-danger">Yes</span>' : 
                    '<span class="badge bg-success">No</span>';
                
                const actualBadge = p.Actual_Attrition === 'Yes' ? 
                    '<span class="badge bg-danger">Yes</span>' : 
                    p.Actual_Attrition === 'No' ? 
                    '<span class="badge bg-success">No</span>' : 
                    '<span class="badge bg-secondary">-</span>';
                
                const status = p.Predicted_Attrition === p.Actual_Attrition && p.Actual_Attrition !== 'Unknown' ?
                    '✅' : p.Actual_Attrition !== 'Unknown' ? '⚠️' : '⏳';

                html += `<tr>
                    <td><strong>${p.EmployeeNumber}</strong></td>
                    <td>${(p.Attrition_Risk_Score * 100).toFixed(1)}%</td>
                    <td><span class="${tierClass}">${p.Risk_Tier}</span></td>
                    <td>${predBadge}</td>
                    <td>${actualBadge}</td>
                    <td>${status}</td>
                </tr>`;
            });

            html += `</tbody></table></div>`;
            html += `<p class="text-muted small">Showing ${predictions.length} records</p>`;
            container.innerHTML = html;
        }

        // Filters
        document.getElementById('searchInput').addEventListener('input', function() {
            const search = this.value.toLowerCase();
            const filtered = allPredictions.filter(p => 
                String(p.EmployeeNumber).includes(search)
            );
            renderPredictions(filtered);
        });

        document.getElementById('riskFilter').addEventListener('change', function() {
            const filter = this.value;
            const filtered = filter === 'all' ? allPredictions : 
                allPredictions.filter(p => p.Risk_Tier === filter);
            renderPredictions(filtered);
        });

        // Load on page load
        loadPredictions();
    </script>
</body>
</html>
